version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financio-db
    restart: unless-stopped
    ports:
      - '6432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-financio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U financio']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
